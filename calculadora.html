    <div class="principal">
        <div class="contenedor">
            <h1>Calculadora</h1>

            <div class="inputCaledad">

                <input type="number" id="valor2" placeholder="Segundo Valor">
            </div>

            <div class="signos">
                <button onclick="sumar()">Sumar</button>
                <button onclick="restar()">Restar</button>
                <button onclick="multiplicar()">Multiplicar</button>
                <button onclick="dividir()">Dividir</button>
                <button onclick="potencia()">Potencia</button>

            </div>

            <p id="resultado">0</p> 

        </div>

        <div class="contenedor ">
            <h1>Calculadora de Edad</h1>
            <input class="calculadoraE" type="date" id="fechaNacimiento">
            <button class="calculadoraE" id="btnCalcular">Calcular edad</button>
            <p id="resultadoo">0</p>
